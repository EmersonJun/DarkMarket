    <circle cx="242" cy="206" r="15" fill="#19e0c8" stroke="none"/>
    <circle cx="163" cy="201" r="5" fill="#d6fff7" stroke="none"/>
    <circle cx="247" cy="201" r="5" fill="#d6fff7" stroke="none"/>
    <!-- Focinho -->
